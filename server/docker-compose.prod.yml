# Knowledge Base — production stack. Plugs into the existing Traefik + host
# Postgres setup (see ../../santiago/SERVER_SETUP.md). No host ports; routing
# via Traefik labels on the shared `traefik-public` network.
#
# Set APP_HOST in .env.prod (e.g. library.example.com).

name: knowledge_base

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    image: knowledge_base/api:latest
    container_name: kb_api
    env_file: [.env.prod]
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach native host Postgres
    volumes:
      - ../data:/app/data:ro                  # committed artifacts, for `ingest.py`
    expose: ["8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:8000/healthz',timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s          # first start downloads the bge-small model
    networks: [kb-net, traefik-public]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # App + API (catch-all for the host)
      - "traefik.http.routers.kb-api.rule=Host(`${APP_HOST}`)"
      - "traefik.http.routers.kb-api.entrypoints=websecure"
      - "traefik.http.routers.kb-api.tls=true"
      - "traefik.http.routers.kb-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.kb-api.loadbalancer.server.port=8000"
      # ForwardAuth middleware (used by the media router)
      - "traefik.http.middlewares.kb-auth.forwardauth.address=http://kb_api:8000/auth/verify"
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits:       { cpus: '1.0', memory: 600M }
        reservations: { cpus: '0.25', memory: 300M }

  media:
    image: nginx:1.27-alpine
    container_name: kb_media
    volumes:
      - ../media:/srv/media:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose: ["8080"]
    networks: [traefik-public]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.kb-media.rule=Host(`${APP_HOST}`) && PathPrefix(`/media`)"
      - "traefik.http.routers.kb-media.entrypoints=websecure"
      - "traefik.http.routers.kb-media.tls=true"
      - "traefik.http.routers.kb-media.tls.certresolver=letsencrypt"
      - "traefik.http.routers.kb-media.middlewares=kb-auth@docker"
      - "traefik.http.services.kb-media.loadbalancer.server.port=8080"
    depends_on:
      api: { condition: service_healthy }
    restart: unless-stopped
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 64M }

networks:
  kb-net: { driver: bridge }
  traefik-public: { name: traefik-public, external: true }

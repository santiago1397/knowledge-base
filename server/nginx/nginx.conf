# Serves the course videos with native HTTP-range seeking. Auth is enforced by
# Traefik ForwardAuth (see compose labels) BEFORE requests reach here, so this
# server itself is dumb static file serving.

server {
    listen 8080;
    server_name _;

    # Videos are mounted read-only at /srv/media/<course>/<file>.mp4
    location /media/ {
        alias /srv/media/;
        add_header Accept-Ranges bytes;
        types { video/mp4 mp4; }
        default_type application/octet-stream;
        autoindex off;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
